name: Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Publish with provenance. Two supported paths:
      #
      # 1. Token-based (default): set the `NPM_TOKEN` repo secret to an npm
      #    automation token. The `id-token: write` permission above plus
      #    `--provenance` is still enough to generate the Sigstore attestation;
      #    npm just uses the token for auth.
      #
      # 2. Trusted Publishing (preferred, requires one-time configuration on
      #    npmjs.com after the first publish): once the package exists, link
      #    this repo + workflow under "Trusted Publishers" on the package's
      #    npmjs settings page. Then delete the `NODE_AUTH_TOKEN` env line
      #    below; `id-token: write` is sufficient and no `NPM_TOKEN` secret is
      #    needed.
      - name: Publish with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
